services:
  pihole:
    container_name: pihole
    image: pihole/pihole:2026.07.2@sha256:8bafd2fed06b05dbd98a75c66f796b8b192b175e8bbecef2d940d95b0aa54a1b
    ports:
      - "192.168.10.19:53:53/tcp"
      - "192.168.10.19:53:53/udp"
    environment:
      TZ: 'Europe/Stockholm'
      WEBPASSWORD_FILE: pihole_webpasswd
      FTLCONF_dns_listeningMode: 'ALL'
    volumes:
      - './pihole.toml:/etc/pihole/pihole.toml'
    cap_add:
      - NET_ADMIN
    secrets:
      - pihole_webpasswd
    restart: unless-stopped

  caddy:
    image: caddy-server:latest
    restart: unless-stopped
    env_file:
      - .caddy_env
    ports:
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./conf:/etc/caddy
      - ./site:/srv
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:

secrets:
  pihole_webpasswd:
    file: ./pihole_password.txt