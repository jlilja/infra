---
version: "3"

tasks:
  create-iso-from-files:
    cmds:
      - rm -r iso || true
      - rm ks.iso || true
      - mkdir iso
      - cp ks.cfg cloud-init.yml iso
      - xorriso -as mkisofs -o ks.iso iso/
      - sha256sum ks.iso

  write-iso-to-usb:
    deps:
      - create-iso-from-files
    cmds:
      - sync
      - sudo dd if=ks.iso of=/dev/sda bs=8M status=progress conv=fsync
      - sync
      - sha256sum ks.iso
