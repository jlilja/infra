%post

mkdir -p /var/lib/cloud/seed/nocloud

cat > /var/lib/cloud/seed/nocloud/meta-data <<EOF
instance-id: fedora-workstation
EOF

cat > /var/lib/cloud/seed/nocloud/user-data <<'EOF'
#cloud-config

hostname: fedora-workstation

timezone: Europe/Stockholm

system_info:
  default_user:
    name: jonas

package_update: true

packages:
  - htop
  - git

write_files:
  - path: /etc/motd
    content: |
      Fedora configured by cloud-init on https://github.com/jlilja/infra

runcmd:
  - systemctl set-default graphical.target
EOF

systemctl enable cloud-init-local.service
systemctl enable cloud-init.service
systemctl enable cloud-config.service
systemctl enable cloud-final.service

%end

reboot
